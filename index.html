<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Financiero - Proyecto Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card { border-radius: 12px; }
    </style>
    <script defer src="js/script.js"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center mb-4 fw-bold text-primary">Control Financiero Pro</h1>

        <div class="card mb-4 text-center shadow border-0 bg-white">
            <div class="card-body">
                <p class="text-muted mb-1">Patrimonio Neto Actual</p>
                <h2 id="balance-total" class="fw-bold">$0</h2>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card mb-3 shadow-sm">
                    <div class="card-header bg-success text-white fw-bold">1. Nuevo Fondo</div>
                    <div class="card-body">
                        <form id="form-fondo">
                            <input type="text" class="form-control mb-2" id="fondo-nombre" placeholder="Nombre (Ej: Banco)" required>
                            <input type="number" class="form-control mb-2" id="fondo-monto" placeholder="Monto Inicial" required>
                            <button type="submit" class="btn btn-success w-100">Crear Fondo</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-danger text-white fw-bold">2. Nueva Deuda</div>
                    <div class="card-body">
                        <form id="form-deuda">
                            <input type="text" class="form-control mb-2" id="deuda-desc" placeholder="Descripción" required>
                            <input type="number" class="form-control mb-2" id="deuda-monto" placeholder="Monto a deber" required>
                            <button type="submit" class="btn btn-danger w-100">Registrar Deuda</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-warning mb-3 shadow-sm">
                    <div class="card-header bg-warning text-dark fw-bold">3. Registrar Gasto</div>
                    <div class="card-body">
                        <form id="form-gasto">
                            <label class="form-label small">¿De dónde sale el dinero?</label>
                            <select id="select-fondo-gasto" class="form-select mb-2" required>
                                <option value="">Cargando fondos...</option>
                            </select>
                            <input type="number" class="form-control mb-2" id="gasto-monto" placeholder="Monto del gasto" required>
                            <button type="submit" class="btn btn-warning w-100">Registrar Gasto</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <h5 class="text-success fw-bold">Fondos Disponibles</h5>
                <ul id="lista-fondos" class="list-group mb-4 shadow-sm"></ul>

                <h5 class="text-danger fw-bold">Deudas Pendientes</h5>
                <ul id="lista-deudas" class="list-group mb-4 shadow-sm"></ul>
                
                <button id="btn-borrar-datos" class="btn btn-outline-secondary btn-sm w-100 mb-5">Reiniciar Sistema</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body>
</html>
